<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🌟 School Rewards</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<meta name="theme-color" content="#e91e8c">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
:root{--p:#e91e8c;--pl:#fce4f3;--s:#ab47bc;--bg:linear-gradient(135deg,#fce4ec,#f3e5f5,#ede7f6);--cb:rgba(233,30,140,.15);--tm:#4a1942;--tmu:#8e6a8e;--sh:0 8px 32px rgba(233,30,140,.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito','Segoe UI',sans-serif;background:var(--bg);color:var(--tm);min-height:100vh}
h1,h2,h3,.df{font-family:'Comfortaa',cursive}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--pl);border-radius:3px}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.app{max-width:900px;margin:0 auto;padding:16px;position:relative;z-index:1}
.card{background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border:1px solid var(--cb);border-radius:20px;box-shadow:var(--sh);padding:24px;margin-bottom:20px}
.bal{background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-radius:20px;padding:24px;text-align:center;margin-bottom:24px;position:relative;overflow:hidden}
.bal::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(255,255,255,.1);border-radius:50%}
.bal-amt{font-family:'Comfortaa',cursive;font-size:2.4rem;font-weight:900;line-height:1;margin:6px 0}
.bal-lbl{opacity:.85;font-size:.82rem;text-transform:uppercase;letter-spacing:2px}
.bal-sub{display:flex;justify-content:center;gap:18px;margin-top:12px;font-size:.82rem;opacity:.9;flex-wrap:wrap}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 0}
.hdr h1{font-size:1.3rem;font-weight:800}
.tabs{display:flex;gap:4px;background:var(--pl);border-radius:14px;padding:4px;margin-bottom:18px;overflow-x:auto}
.tab{flex:1;padding:10px 8px;border:none;background:transparent;border-radius:11px;font-weight:700;font-size:.76rem;color:var(--tmu);cursor:pointer;white-space:nowrap;font-family:'Nunito',sans-serif}
.tab.on{background:#fff;color:var(--p);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.btn{padding:6px 14px;border:2px solid var(--p);background:transparent;color:var(--p);border-radius:10px;font-weight:700;cursor:pointer;font-size:.82rem}
.btn-p{padding:14px 28px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border:none;border-radius:14px;font-weight:700;font-size:1rem;cursor:pointer;width:100%}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.inp{width:100%;padding:12px 16px;border-radius:12px;border:2px solid var(--cb);font-family:'Nunito',sans-serif;font-size:.95rem;margin-bottom:12px;background:#fff}
.inp:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px var(--pl)}
.lbl{font-weight:700;font-size:.85rem;color:var(--tmu);display:block;margin-bottom:6px}
.gi{display:flex;align-items:center;gap:12px;padding:14px 16px;background:rgba(255,255,255,.85);border-radius:14px;border:1px solid var(--cb);margin-bottom:8px;flex-wrap:wrap;animation:fadeIn .3s}
.gb{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;font-family:'Comfortaa',cursive}
.g5{background:#e8f5e9;color:#66bb6a}.g4{background:#e3f2fd;color:#42a5f5}.g3{background:#fff3e0;color:#ffa726}.g2{background:#ffebee;color:#ef5350}.g1{background:#ffcdd2;color:#b71c1c}
.st{font-size:.68rem;padding:3px 10px;border-radius:20px;font-weight:700;white-space:nowrap}
.st-p{background:#fff3e0;color:#e65100}.st-a{background:#e8f5e9;color:#2e7d32}.st-r{background:#ffebee;color:#c62828}
.amt{font-weight:800;font-family:'Comfortaa',cursive;white-space:nowrap}.amt-pos{color:#66bb6a}.amt-neg{color:#ef5350}
.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:14px 24px;border-radius:14px;color:#fff;font-weight:700;box-shadow:0 8px 32px rgba(0,0,0,.2);max-width:320px}
.toast-s{background:#66bb6a}.toast-e{background:#ef5350}
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;font-size:.8rem;font-weight:600;border:1px solid var(--cb);background:#fff;margin:2px}
.chip.off{opacity:.4;text-decoration:line-through}
.chip button{background:none;border:none;cursor:pointer;font-size:.8rem;padding:0 2px;color:var(--tmu)}
.pager{display:flex;align-items:center;justify-content:center;gap:8px;margin:16px 0}
.pager button{padding:8px 14px;border-radius:10px;border:2px solid var(--cb);background:#fff;font-weight:700;cursor:pointer;font-size:.82rem;color:var(--tm)}
.pager button:disabled{opacity:.3;cursor:not-allowed}
.pager button.cur{background:var(--p);color:#fff;border-color:var(--p)}
.pager span{font-size:.82rem;color:var(--tmu)}
.grade-btn{min-width:62px;min-height:62px;border-radius:14px;border:3px solid transparent;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 8px;transition:all .2s;line-height:1.1}
.grade-btn.sel{border-color:var(--p);transform:scale(1.1);box-shadow:0 6px 20px rgba(0,0,0,.15)}
.file-up{border:2px dashed var(--cb);border-radius:14px;padding:18px;text-align:center;cursor:pointer;margin-bottom:12px;transition:all .2s}
.file-up.has{border-color:#66bb6a;background:#e8f5e9}
.lang-btn{padding:7px 12px;border-radius:10px;border:2px solid var(--cb);background:#fff;font-weight:700;cursor:pointer;font-size:.78rem;display:flex;align-items:center;gap:3px}
.lang-btn.on{border-color:var(--p);background:var(--pl)}
.danger-btn{padding:12px 20px;background:#ef5350;color:#fff;border:none;border-radius:14px;font-weight:700;cursor:pointer;font-size:.9rem;width:100%;margin-top:12px}
.empty{text-align:center;padding:40px;color:var(--tmu)}
@media(max-width:576px){.bal-amt{font-size:2rem}.bal-sub{flex-direction:column;gap:4px}}
</style>
</head>
<body>
<div id="root"></div>
