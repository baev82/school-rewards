version: "3.9"

services:
  php-fpm:
    build: .
    container_name: school-rewards-php
    volumes:
      - ./:/var/www/html
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: school-rewards-nginx
    ports:
      - "3001:80"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm
    restart: unless-stopped