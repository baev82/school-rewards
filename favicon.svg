<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e91e8c"/>
      <stop offset="50%" style="stop-color:#ab47bc"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F"/>
      <stop offset="100%" style="stop-color:#FFB300"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A"/>
      <stop offset="100%" style="stop-color:#43A047"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <!-- Decorative circles -->
  <circle cx="120" cy="120" r="60" fill="rgba(255,255,255,0.08)"/>
  <circle cx="400" cy="380" r="80" fill="rgba(255,255,255,0.06)"/>
  <!-- Star -->
  <g filter="url(#shadow)">
    <polygon points="256,80 295,190 410,190 315,255 345,370 256,300 167,370 197,255 102,190 217,190" fill="url(#star)" stroke="#FF8F00" stroke-width="3" stroke-linejoin="round"/>
  </g>
  <!-- 5+ text on star -->
  <text x="236" y="250" font-family="Arial,sans-serif" font-size="90" font-weight="900" fill="#E65100">5</text>
  <text x="310" y="218" font-family="Arial,sans-serif" font-size="48" font-weight="900" fill="#E65100">+</text>
  <!-- Coin at bottom right -->
  <g filter="url(#shadow)">
    <circle cx="380" cy="390" r="48" fill="url(#coin)" stroke="#2E7D32" stroke-width="3"/>
    <text x="380" y="403" font-family="Arial,sans-serif" font-size="36" font-weight="900" fill="#fff" text-anchor="middle">₽</text>
  </g>
  <!-- Graduation cap at top -->
  <g transform="translate(340,70) scale(0.7)" filter="url(#shadow)">
    <polygon points="50,40 0,65 50,90 100,65" fill="#263238" stroke="#37474F" stroke-width="2"/>
    <rect x="47" y="40" width="6" height="-15" fill="#263238"/>
    <circle cx="50" cy="22" r="6" fill="#FFD54F"/>
    <line x1="90" y1="65" x2="90" y2="95" stroke="#263238" stroke-width="3"/>
    <rect x="82" y="90" width="16" height="6" rx="3" fill="#FFD54F"/>
  </g>
</svg>
